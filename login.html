<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Login — Reeds Solutions</title>
<link rel="stylesheet" href="/static/styles.css">
<style>
  body { background-color:#ffffff; color:#000000; font-family:Arial, sans-serif; }
  .login-container { max-width:400px; margin:80px auto; padding:20px; border:1px solid #ccc; border-radius:8px; }
  .login-container h2 { color:#001f3f; text-align:center; }
  input, button { width:100%; padding:10px; margin:5px 0; }
  button { background-color:#001f3f; color:#fff; border:none; cursor:pointer; }
  .error { color:red; text-align:center; }
</style>
</head>
<body>
<div class="login-container">
  <h2>Reeds Solutions Portal</h2>
  {% if error %}
  <p class="error">{{ error }}</p>
  {% endif %}
  <form method="POST">
    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>
</div>
</body>
</html>
