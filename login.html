<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Portal Login - Reeds Solutions</title>
<link rel="stylesheet" href="../styles.css">
</head>
<body>
<header>
<img src="../logo-RS-machinery-detailed.svg" alt="Reeds Solutions Logo" />
</header>

<h1>Portal Login</h1>
<form method="POST">
<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>
{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

<footer>&copy; 2026 Reeds Solutions, LLC</footer>
</body>
</html>
