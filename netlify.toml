# Netlify Configuration for Reeds Solutions LLC
# Note: This site is hosted on GitHub Pages, not Netlify

# Publish directory - serve files from root
publish = "."

# Build settings
[build]
  command = ""
  publish = "."

# Redirects for clean URLs
[[redirects]]
from = "/about"
to = "/about.html"
status = 200

[[redirects]]
from = "/capabilities"
to = "/capabilities.html"
status = 200

[[redirects]]
from = "/contracting"
to = "/contracting.html"
status = 200

[[redirects]]
from = "/contact"
to = "/contact.html"
status = 200

[[redirects]]
from = "/privacy"
to = "/privacy.html"
status = 200

[[redirects]]
from = "/accessibility"
to = "/accessibility.html"
status = 200

[[redirects]]
from = "/security"
to = "/security-compliance.html"
status = 200

[[redirects]]
from = "/capabilities-statement"
to = "/capability-statement.html"
status = 200

[[redirects]]
from = "/careers"
to = "/careers.html"
status = 200

# 404 handling
[[redirects]]
from = "/*"
to = "/404.html"
status = 404

# Security headers
[[headers]]
for = "/*"
[headers.values]
  X-Frame-Options = "SAMEORIGIN"
  X-Content-Type-Options = "nosniff"
  X-XSS-Protection = "1; mode=block"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "geolocation=(), microphone=(), camera=()"
